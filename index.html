<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0" />
  <title>TweetShot — Minimal & Beautiful</title>
  <meta name="description" content="A beautifully simple tool to capture tweet screenshots." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✨</text></svg>" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

  <!-- BACKGROUND DESIGN -->
  <div class="bg-mesh"></div>

  <!-- MAIN APP CONTAINER -->
  <div class="app-container" id="app-container">
    
    <!-- TOP / HERO SECTION -->
    <div class="hero-section" id="hero-section">
      <div class="logo-area">
        <svg viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="4" ry="4"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21"/></svg>
        <h1>tweetshot.</h1>
      </div>

      <div class="url-wrapper">
        <div class="url-bar">
          <input type="text" id="url-input" placeholder="Paste a Twitter or X link..." autocomplete="off" spellcheck="false" />
          <button id="btn-gen" class="btn-gen">
            <span>Capture</span>
            <svg viewBox="0 0 24 24" width="16" height="16" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </button>
        </div>
      </div>
      
      <div id="empty-msg" class="empty-msg">
        No ads. No watermarks. Just beautiful, clean screenshots.
      </div>
    </div>

    <!-- PREVIEW AREA (Fades in when tweet is loaded) -->
    <div class="preview-section" id="preview-section" style="display: none;">
      
      <!-- CAPTURE ELEMENT -->
      <div id="capture-wrap">
        <div id="capture-area">
          <div id="tweet-card" class="theme-light">
            <div class="tc-head">
              <div class="tc-author">
                <img id="tc-av" class="tc-av" src="" alt="" crossorigin="anonymous" />
                <div class="tc-author-info">
                  <div class="tc-name-row">
                    <span id="tc-name" class="tc-name"></span>
                    <span id="tc-badge" class="tc-verified" style="display:none;">
                      <svg viewBox="0 0 22 22" width="16" height="16"><path fill="#1d9bf0" d="M20.396 11c-.018-.646-.215-1.275-.57-1.816-.354-.54-.852-.972-1.438-1.246.223-.607.27-1.264.14-1.897-.131-.634-.437-1.218-.882-1.687-.47-.445-1.053-.75-1.687-.882-.633-.13-1.29-.083-1.897.14-.273-.587-.704-1.086-1.245-1.44S11.647 1.62 11 1.604c-.646.017-1.273.213-1.813.568s-.969.852-1.24 1.44c-.608-.223-1.267-.272-1.902-.14-.635.13-1.22.436-1.69.882-.445.47-.749 1.055-.878 1.69-.13.633-.08 1.29.144 1.896-.587.274-1.087.705-1.443 1.245-.356.54-.555 1.17-.574 1.817.02.647.218 1.276.574 1.817.356.54.856.972 1.443 1.245-.224.606-.274 1.263-.144 1.896.13.636.433 1.221.878 1.69.47.446 1.055.752 1.69.883.635.13 1.294.083 1.902-.143.271.587.702 1.084 1.24 1.438.54.354 1.167.551 1.813.569.647-.016 1.276-.213 1.817-.567s.972-.854 1.245-1.44c.604.223 1.261.272 1.893.143.636-.131 1.222-.437 1.69-.883.445-.47.751-1.054.882-1.69.132-.633.083-1.29-.14-1.898.585-.27 1.084-.699 1.439-1.24.354-.54.551-1.169.569-1.816zM9.662 14.85l-3.429-3.428 1.293-1.302 2.072 2.072 4.4-4.794 1.347 1.246z"/></svg>
                    </span>
                  </div>
                  <span id="tc-handle" class="tc-handle"></span>
                  <span id="tc-affiliate" class="tc-affiliate" style="display:none;"></span>
                </div>
              </div>
              <div class="tc-xlogo">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 22.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
              </div>
            </div>

            <div id="tc-text" class="tc-text"></div>
            <div id="tc-media" class="tc-media"></div>

            <div id="tc-time" class="tc-time"></div>

            <div class="tc-metrics">
              <div class="tc-met"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"/></svg><span id="tm-rep"></span></div>
              <div class="tc-met"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M4.5 3.88l4.432 4.14-1.364 1.46L5.5 7.55V16c0 1.1.896 2 2 2H13v2H7.5c-2.209 0-4-1.79-4-4V7.55L1.432 9.48.068 8.02 4.5 3.88zM16.5 6H11V4h5.5c2.209 0 4 1.79 4 4v8.45l2.068-1.93 1.364 1.46-4.432 4.14-4.432-4.14 1.364-1.46 2.068 1.93V8c0-1.1-.896-2-2-2z"/></svg><span id="tm-ret"></span></div>
              <div class="tc-met"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M16.697 5.5c-1.222-.06-2.679.51-3.89 2.16l-.805 1.09-.806-1.09C9.984 6.01 8.526 5.44 7.304 5.5c-1.243.07-2.349.78-2.91 1.91-.552 1.12-.633 2.78.479 4.82 1.074 1.97 3.257 4.27 7.129 6.61 3.87-2.34 6.052-4.64 7.126-6.61 1.111-2.04 1.03-3.7.477-4.82-.561-1.13-1.666-1.84-2.908-1.91zm4.187 7.69c-1.351 2.48-4.001 5.12-8.379 7.67l-.503.3-.504-.3c-4.379-2.55-7.029-5.19-8.382-7.67-1.36-2.5-1.41-4.86-.514-6.67.887-1.79 2.647-2.91 4.601-3.01 1.651-.09 3.368.56 4.798 2.01 1.429-1.45 3.146-2.1 4.796-2.01 1.954.1 3.714 1.22 4.601 3.01.896 1.81.846 4.17-.514 6.67z"/></svg><span id="tm-lik"></span></div>
              <div class="tc-met"><svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M8.75 21V3h2v18h-2zM18 21V8.5h2V21h-2zM4 21l.004-10h2L6 21H4zm9.248 0v-7h2v7h-2z"/></svg><span id="tm-view"></span></div>
            </div>
          </div>
        </div>
        
        <!-- EXPORT BAR -->
        <div id="export-bar" class="export-bar">
          <button id="btn-dl" class="btn-exp primary">
            <svg viewBox="0 0 24 24" width="18" height="18" stroke="currentColor" stroke-width="2.5" fill="none"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
            Save High-Res Image
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- OVERLAYS -->
  <div id="loading" class="overlay" style="display:none; background: transparent;">
    <div class="spinner-wrap">
      <svg class="spinner" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke-width="4"></circle></svg>
    </div>
  </div>
  <div id="error" class="overlay" style="display:none; background: transparent;">
    <div class="err-box">
      <svg viewBox="0 0 24 24" width="28" height="28" stroke="#e53e3e" stroke-width="2" fill="none"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
      <div id="err-msg"></div>
      <button id="btn-dismiss" class="btn-dismiss">Close</button>
    </div>
  </div>

  <script src="/main.js" type="module"></script>
</body>
</html>
